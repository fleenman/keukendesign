<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Stadshaege CMS</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f4ef;
        --surface: #ffffff;
        --ink: #1f211d;
        --muted: #5d6258;
        --line: #ded8ce;
        --accent: #11140f;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .cms-login {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .cms-login__panel {
        width: min(100%, 560px);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 24px 60px rgba(31, 33, 29, 0.12);
        padding: clamp(24px, 5vw, 40px);
      }

      .cms-login__brand {
        margin-bottom: 28px;
        line-height: 1;
      }

      .cms-login__brand strong {
        display: block;
        font-size: 26px;
        font-weight: 500;
        letter-spacing: 0;
      }

      .cms-login__brand span {
        display: block;
        width: 166px;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.445em;
      }

      .cms-login h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 6vw, 44px);
        font-weight: 400;
        line-height: 1.08;
      }

      .cms-login p {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.55;
      }

      .cms-login label {
        display: block;
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
      }

      .cms-login input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 14px 14px;
        color: var(--ink);
        font: inherit;
      }

      .cms-login input:focus {
        border-color: var(--accent);
        outline: 3px solid rgba(31, 33, 29, 0.14);
      }

      .cms-login button {
        width: 100%;
        margin-top: 16px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 14px 18px;
      }

      .cms-login button:focus {
        outline: 3px solid rgba(31, 33, 29, 0.24);
        outline-offset: 2px;
      }

      .cms-login__hint,
      .cms-login__error {
        margin-top: 14px;
        font-size: 14px;
      }

      .cms-login__error {
        color: #9d1c1c;
      }

      .cms-login a {
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <div id="cms-token-login" class="cms-login" hidden>
      <form class="cms-login__panel" id="cms-token-form">
        <div class="cms-login__brand" aria-label="Stadshaege keukendesign">
          <strong>STADSHAEGE</strong>
          <span>keukendesign</span>
        </div>
        <h1>CMS toegang</h1>
        <p>
          Log in met een eigen GitHub fine-grained token voor deze repository.
          Collaborators hebben minimaal write access nodig op
          <strong>jleenman/keukendesign</strong>.
        </p>
        <label for="cms-token">GitHub token</label>
        <input id="cms-token" name="token" type="password" autocomplete="off" spellcheck="false" required>
        <button type="submit">Open CMS</button>
        <p class="cms-login__hint">
          Token nodig? Maak in GitHub een fine-grained token met
          <strong>Contents: Read and write</strong> voor deze repository.
        </p>
        <p class="cms-login__error" id="cms-token-error" role="alert" hidden></p>
      </form>
    </div>

    <script>
      (function () {
        var storageKey = 'decap-cms-user';
        var storedUser = window.localStorage.getItem(storageKey);
        var hasAuthCallback = /(?:access_token|code|error)=/.test(window.location.hash + window.location.search);

        function loadDecap() {
          var script = document.createElement('script');
          script.src = 'https://unpkg.com/decap-cms@3.8.3/dist/decap-cms.js';
          script.async = true;
          document.body.appendChild(script);
        }

        if (storedUser || hasAuthCallback) {
          loadDecap();
          return;
        }

        var login = document.getElementById('cms-token-login');
        var form = document.getElementById('cms-token-form');
        var input = document.getElementById('cms-token');
        var error = document.getElementById('cms-token-error');

        login.hidden = false;
        input.focus();

        form.addEventListener('submit', function (event) {
          event.preventDefault();
          var token = input.value.trim();

          if (!token) {
            error.textContent = 'Vul een GitHub token in.';
            error.hidden = false;
            return;
          }

          window.localStorage.setItem(storageKey, JSON.stringify({
            backendName: 'github',
            token: token
          }));
          window.location.reload();
        });
      }());
    </script>
  </body>
</html>
